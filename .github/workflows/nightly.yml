name: Nightly Tests

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '22'

permissions:
  contents: read
  issues: write

jobs:
  check-commits:
    runs-on: ubuntu-latest
    outputs:
      has_commits: ${{ steps.filter.outputs.has_commits }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        run: |
          COUNT=$(git log --since='24 hours ago' --oneline | wc -l | tr -d ' ')
          echo "has_commits=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

  e2e-full:
    name: Full E2E Suite
    needs: check-commits
    if: needs.check-commits.outputs.has_commits == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: nextjs-${{ hashFiles('package-lock.json') }}-
      - run: npm run build
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}
      - name: Install All Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Full Test Suite
        run: PLAYWRIGHT_FULL_MATRIX=1 npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: nightly-report
          path: playwright-report/
          retention-days: 14
      - name: Open failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Nightly E2E failed',
              body: `The nightly E2E test suite failed.\n\nWorkflow run: ${runUrl}`,
              
            });
